version: "3.9"

services:
  gateway:
    build:
      context: ../
      dockerfile: services/gateway/Dockerfile
    container_name: variance-gateway
    ports:
      - "8000:8000"
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SERVICE_NAME=gateway
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/variance_agent
      - COMPUTATION_SERVICE_URL=http://computation:8001
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - variance-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  computation:
    build:
      context: ../
      dockerfile: services/computation/Dockerfile
    container_name: variance-computation
    ports:
      - "8001:8001"
    env_file:
      - ../.env
    environment:
      - REDIS_URL=redis://redis:6379/0
      - SERVICE_NAME=computation
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/variance_agent
      - QDRANT_URL=http://qdrant:6333
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    networks:
      - variance-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8001/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  reports:
    build:
      context: ../
      dockerfile: services/reports/Dockerfile
    container_name: variance-reports
    ports:
      - "8002:8002"
    env_file:
      - ../.env
    environment:
      - SERVICE_NAME=reports
    networks:
      - variance-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8002/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped

  frontend:
    build:
      context: ../
      dockerfile: frontend/Dockerfile
    container_name: variance-frontend
    ports:
      - "3000:3000"
    networks:
      - variance-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: variance-postgres
    environment:
      POSTGRES_DB: variance_agent
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - variance-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  qdrant:
    image: qdrant/qdrant:v1.12.1
    container_name: variance-qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant-data:/qdrant/storage
    networks:
      - variance-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: variance-redis
    ports:
      - "6379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    networks:
      - variance-net
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: variance-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      gateway:
        condition: service_healthy
      computation:
        condition: service_healthy
      reports:
        condition: service_healthy
      frontend:
        condition: service_healthy
    networks:
      - variance-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80/nginx-health"]
      interval: 15s
      timeout: 5s
      retries: 3
    restart: unless-stopped

networks:
  variance-net:
    driver: bridge

volumes:
  postgres-data:
    driver: local
  qdrant-data:
    driver: local
  redis-data:
    driver: local
