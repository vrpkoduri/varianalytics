# =============================================================================
# LLM Model Routing Configuration
# =============================================================================
# Maps tasks to LLM models via LiteLLM. Model-agnostic — change providers
# by updating model identifiers.

default_provider: "anthropic"

providers:
  anthropic:
    chat_intent:
      model: "anthropic/claude-haiku-3-20250414"
      max_tokens: 200
      temperature: 0.1
    chat_response:
      model: "anthropic/claude-sonnet-4-20250514"
      max_tokens: 3000
      temperature: 0.5
    narrative_generation:
      model: "anthropic/claude-sonnet-4-20250514"
      max_tokens: 2000
      temperature: 0.4
    hypothesis_generation:
      model: "anthropic/claude-sonnet-4-20250514"
      max_tokens: 1000
      temperature: 0.3
    oneliner_generation:
      model: "anthropic/claude-haiku-3-20250414"
      max_tokens: 100
      temperature: 0.2

  azure:
    chat_intent:
      model: "azure/gpt-4o-mini"
      max_tokens: 200
      temperature: 0.1
    chat_response:
      model: "azure/gpt-4o"
      max_tokens: 3000
      temperature: 0.5
    narrative_generation:
      model: "azure/gpt-4o"
      max_tokens: 2000
      temperature: 0.4
    hypothesis_generation:
      model: "azure/gpt-4o"
      max_tokens: 1000
      temperature: 0.3
    oneliner_generation:
      model: "azure/gpt-4o-mini"
      max_tokens: 100
      temperature: 0.2

embedding:
  model: "azure/text-embedding-3-small"
  dimensions: 1536

rate_limits:
  max_rpm: 500
  max_tpm: 200000
  retry_attempts: 3
  retry_delay_seconds: 1.0
