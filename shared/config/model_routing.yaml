# =============================================================================
# AI Agent Model Routing Configuration
# =============================================================================
# Maps tasks to AI models via LiteLLM. Model-agnostic — change providers
# by updating model identifiers. Cost fields enable accurate cost estimation.

default_provider: "azure"

# Per-task provider override (optional). Omit to use default_provider.
# Example: use cheaper model for intent, premium for narratives.
task_overrides: {}
  # chat_intent: anthropic
  # narrative_generation: azure

providers:
  anthropic:
    chat_intent:
      model: "anthropic/claude-haiku-3-20250414"
      max_tokens: 200
      temperature: 0.1
      cost_input_per_1m: 0.25
      cost_output_per_1m: 1.25
    chat_response:
      model: "anthropic/claude-sonnet-4-20250514"
      max_tokens: 3000
      temperature: 0.5
      cost_input_per_1m: 3.00
      cost_output_per_1m: 15.00
    narrative_generation:
      model: "anthropic/claude-sonnet-4-20250514"
      max_tokens: 2000
      temperature: 0.4
      cost_input_per_1m: 3.00
      cost_output_per_1m: 15.00
    hypothesis_generation:
      model: "anthropic/claude-sonnet-4-20250514"
      max_tokens: 1000
      temperature: 0.3
      cost_input_per_1m: 3.00
      cost_output_per_1m: 15.00
    oneliner_generation:
      model: "anthropic/claude-haiku-3-20250414"
      max_tokens: 100
      temperature: 0.2
      cost_input_per_1m: 0.25
      cost_output_per_1m: 1.25

  azure:
    chat_intent:
      model: "azure/mmc-tech-gpt-4o-mini-128k-2024-07-18"
      max_tokens: 200
      temperature: 0.1
      cost_input_per_1m: 0.15
      cost_output_per_1m: 0.60
    chat_response:
      model: "azure/mmc-tech-gpt-41-mini-1m-2025-04-14"
      max_tokens: 3000
      temperature: 0.5
      cost_input_per_1m: 0.40
      cost_output_per_1m: 1.60
    narrative_generation:
      model: "azure/mmc-tech-gpt-41-mini-1m-2025-04-14"
      max_tokens: 2000
      temperature: 0.4
      cost_input_per_1m: 0.40
      cost_output_per_1m: 1.60
    hypothesis_generation:
      model: "azure/mmc-tech-gpt-41-mini-1m-2025-04-14"
      max_tokens: 1000
      temperature: 0.3
      cost_input_per_1m: 0.40
      cost_output_per_1m: 1.60
    oneliner_generation:
      model: "azure/mmc-tech-gpt-4o-mini-128k-2024-07-18"
      max_tokens: 100
      temperature: 0.2
      cost_input_per_1m: 0.15
      cost_output_per_1m: 0.60

embedding:
  # Auto-detected from available API keys. Override with 'provider' to force one.
  # provider: "voyage"  # uncomment to force a specific provider
  providers:
    voyage:
      model: "voyage-3-lite"
      dimensions: 1024
    openai:
      model: "text-embedding-3-small"
      dimensions: 1536
    azure:
      model: "azure/mmc-tech-text-embedding-3-small"
      dimensions: 1536
  # Legacy fallback (used if auto-detection fails)
  model: "text-embedding-3-small"
  dimensions: 1536

rate_limits:
  max_rpm: 1000
  max_tpm: 400000
  retry_attempts: 3
  retry_delay_seconds: 1.0
