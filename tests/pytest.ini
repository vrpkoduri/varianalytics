[pytest]
testpaths = tests
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (may need services running)
    e2e: End-to-end tests (full stack)
    slow: Slow tests (>10s)
addopts = -v --tb=short -x
python_files = test_*.py
python_classes = Test*
python_functions = test_*
